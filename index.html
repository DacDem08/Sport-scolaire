<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chrono - Pratiques Sportives</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .team-status {
      margin: 0;
      font-weight: bold;
      color: #2c3e50;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .add-btn { background: #2ecc71; color: white; }
    .team-btn { background: #1abc9c; color: white; }
    .teams-count-btn { background: #34495e; color: white; }
    .start { background: #3498db; color: white; }
    .pause { background: #f39c12; color: white; }
    .reset { background: #9b59b6; color: white; }
    .delete { background: #e74c3c; color: white; }

    .left-controls {
      position: fixed;
      left: 20px;
      top: 110px;
      z-index: 10;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .time {
      font-size: 28px;
      margin: 15px 0;
      font-family: monospace;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <h1>Chrono - Pratiques Sportives</h1>

  <div class="top-bar">
    <button class="team-btn" onclick="chooseTeam()">Choix d'équipe</button>
    <p class="team-status" id="teamStatus">Aucune équipe sélectionnée</p>
    <button class="add-btn" onclick="addPractice()">+ Ajouter une pratique</button>
  </div>

  <div class="left-controls">
    <button class="teams-count-btn" onclick="chooseTeamCount()">Choix du nombre d'équipes</button>
  </div>

  <div class="grid" id="practiceContainer"></div>

  <script>
    let practices = [];
    let teamCount = 6;
    let selectedTeam = null;

    function formatTime(seconds) {
      const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function updateTeamStatus() {
      const status = document.getElementById('teamStatus');
      status.textContent = selectedTeam ? `Équipe sélectionnée : ${selectedTeam}` : 'Aucune équipe sélectionnée';
    }

    function render() {
      const container = document.getElementById('practiceContainer');
      container.innerHTML = '';

      practices.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <h2>${p.name}</h2>
          <div class="time" id="time-${p.id}">${formatTime(p.time)}</div>
          <div class="btn-group">
            <button class="start" onclick="toggle(${p.id})">${p.active ? 'Pause' : 'Démarrer'}</button>
            <button class="reset" onclick="reset(${p.id})">Reset</button>
            <button class="delete" onclick="removePractice(${p.id})">Supprimer</button>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function toggle(id) {
      const practice = practices.find(p => p.id === id);
      if (!practice) return;
      practice.active = !practice.active;
      render();
    }

    function reset(id) {
      const practice = practices.find(p => p.id === id);
      if (!practice) return;
      practice.time = 0;
      practice.active = false;
      render();
    }

    function removePractice(id) {
      practices = practices.filter(p => p.id !== id);
      render();
    }

    function chooseTeam() {
      const teamChoices = Array.from({ length: teamCount }, (_, index) => `Équipe ${index + 1}`);

      const choice = prompt(
        `Choisis une équipe (1 à ${teamCount}):\n${teamChoices.map((team, index) => `${index + 1}. ${team}`).join('\n')}`,
        '1'
      );

      if (choice === null) return;

      const index = Number(choice.trim()) - 1;
      if (!Number.isInteger(index) || index < 0 || index >= teamChoices.length) {
        alert(`Choix invalide. Merci de saisir un numéro entre 1 et ${teamCount}.`);
        return;
      }

      selectedTeam = teamChoices[index];
      updateTeamStatus();
      alert(`Équipe sélectionnée : ${selectedTeam}`);
    }

    function chooseTeamCount() {
      const input = prompt("Choisis le nombre d'équipes (1 à 6) :", String(teamCount));
      if (input === null) return;

      const count = Number(input.trim());
      if (!Number.isInteger(count) || count < 1 || count > 6) {
        alert('Choix invalide. Merci de saisir un nombre entier entre 1 et 6.');
        return;
      }

      teamCount = count;

      if (selectedTeam) {
        const selectedIndex = Number(selectedTeam.replace('Équipe ', ''));
        if (!Number.isInteger(selectedIndex) || selectedIndex > teamCount || selectedIndex < 1) {
          selectedTeam = null;
          updateTeamStatus();
        }
      }

      alert(`Nombre d'équipes défini à ${teamCount}.`);
    }

    function addPractice() {
      const name = prompt('Nom de la pratique sportive :');
      if (!name || !name.trim()) return;

      practices.push({
        id: Date.now() + Math.floor(Math.random() * 1000),
        name: name.trim(),
        time: 0,
        active: false
      });

      render();
    }

    setInterval(() => {
      practices.forEach(p => {
        if (p.active) {
          p.time++;
          const timeElement = document.getElementById(`time-${p.id}`);
          if (timeElement) {
            timeElement.textContent = formatTime(p.time);
          }
        }
      });
    }, 1000);

    updateTeamStatus();
    render();
  </script>

</body>
</html>
